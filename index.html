<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서낭 - Seonang</title>
    <style>
        /* Classic & Professional Dark Theme */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #121212;
            color: #F5F5F5;
            font-family: 'Nanum Myeongjo', 'Batang', serif;
        }
        .hero-section {
            /* 어두운 배경 이미지와 필터 적용 */
            background-image: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.85)), url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .definition-box {
            border-top: 1px solid rgba(255,255,255,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.4);
            padding: 40px 20px;
            max-width: 600px;
            width: 85%;
            text-align: left;
        }
        h1 { font-size: 3rem; font-weight: normal; margin: 0; display: inline-block; letter-spacing: 2px; }
        .pos { font-size: 1.2rem; color: #aaaaaa; margin-left: 10px; }
        ol { font-size: 1.15rem; line-height: 1.8; margin-top: 25px; padding-left: 25px; }
        li { margin-bottom: 15px; }
        
        .archive-btn {
            margin-top: 60px;
            padding: 12px 35px;
            border: 1px solid #F5F5F5;
            color: #F5F5F5;
            text-decoration: none;
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .archive-btn:hover { background-color: #F5F5F5; color: #121212; }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="definition-box">
            <h1>서낭</h1><span class="pos">[명사]</span>
            <ol>
                <li>1. 마을 어귀를 지키며 액운을 막아주는 토속신</li>
                <li>2. 세계와 세계의 연결, 경계</li>
            </ol>
        </div>
        <a href="/blog" class="archive-btn">Enter Archive</a>
    </div>
</body>
</html>
