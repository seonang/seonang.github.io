---
layout: default
---

<section class="post-page portfolio-page">
    <div class="post-wrap">
        <header class="post-header portfolio-header">
            <div class="post-date">{{ page.date | date: "%Y. %m. %d." }}</div>
            <h1 class="post-title">{{ page.title }}</h1>
            {% if page.excerpt %}
            <p class="post-subtitle">{{ page.excerpt }}</p>
            {% endif %}
        </header>

        {% if page.thumbnail %}
        <div class="portfolio-cover">
            <img src="{{ page.thumbnail | relative_url }}" alt="{{ page.title }}">
        </div>
        {% endif %}

        <article class="post-content">
            {{ content }}
        </article>

        <div class="post-bottom-nav">
            <a href="{{ '/' | relative_url }}#portfolio" class="back-to-blog">← Portfolio로 돌아가기</a>
        </div>
    </div>
</section>
