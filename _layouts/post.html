---
layout: null
---
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - 서낭</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        html { scroll-behavior: smooth; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: #EAE2D6;
            background-image:
                radial-gradient(circle at 0% 20%, rgba(156, 122, 66, 0.08) 0%, transparent 38%),
                radial-gradient(circle at 100% 85%, rgba(120, 102, 76, 0.06) 0%, transparent 40%);
            background-attachment: fixed;
            color: #2F2923;
            font-family: 'Pretendard', sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .serif {
            font-family: 'Noto Serif KR', serif;
            font-weight: 600;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 0;
            background: rgba(234, 226, 214, 0.82);
            backdrop-filter: blur(14px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(70, 55, 38, 0.10);
        }

        .nav-logo {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            margin-left: 5%;
        }

        .nav-logo .serif {
            font-size: 2.4rem;
            color: #2A241F;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .nav-logo .logo-eng {
            font-size: 1rem;
            color: #9C7A42;
            font-family: 'Pretendard', sans-serif;
            letter-spacing: 3px;
            margin-top: 4px;
            font-weight: 300;
        }

        .nav-links {
            margin-right: 5.2%;
        }

        .nav-links a {
            color: #6D6257;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #2A241F;
        }

        .post-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 150px 5% 90px;
        }

        .post-header {
            margin-bottom: 48px;
            padding-bottom: 28px;
            border-bottom: 1px solid rgba(70, 55, 38, 0.10);
        }

        .post-date {
            color: #7A6D61;
            font-size: 0.95rem;
            font-weight: 300;
            margin-bottom: 12px;
        }

        .post-title {
            font-size: 3rem;
            line-height: 1.3;
            margin: 0 0 14px 0;
            color: #2A241F;
            word-break: keep-all;
        }

        .post-subtitle {
            color: #6D6257;
            font-size: 1.05rem;
            font-weight: 300;
            margin: 0;
        }

        .post-content {
            font-size: 1.05rem;
            color: #3A332D;
        }

        .post-content p {
            margin: 0 0 1.4em 0;
        }

        .post-content h2,
        .post-content h3,
        .post-content h4 {
            color: #2A241F;
            margin-top: 2.4em;
            margin-bottom: 0.8em;
            line-height: 1.4;
        }

        .post-content ul,
        .post-content ol {
            margin: 0 0 1.4em 1.4em;
            padding: 0;
        }

        .post-content li {
            margin-bottom: 0.5em;
        }

        .post-content blockquote {
            margin: 2em 0;
            padding: 1px 0 1px 20px;
            border-left: 2px solid rgba(156, 122, 66, 0.5);
            color: #5E544A;
        }

        .post-content a {
            color: #8A6737;
            text-decoration: none;
            border-bottom: 1px solid rgba(138, 103, 55, 0.25);
        }

        .post-content a:hover {
            color: #6F512A;
            border-bottom-color: rgba(111, 81, 42, 0.45);
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 2em auto;
        }

        .post-content hr {
            border: 0;
            border-top: 1px solid rgba(70, 55, 38, 0.10);
            margin: 2.5em 0;
        }

        .post-bottom-nav {
            margin-top: 64px;
            padding-top: 28px;
            border-top: 1px solid rgba(70, 55, 38, 0.10);
        }

        .back-to-blog {
            display: inline-block;
            color: #6D6257;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-to-blog:hover {
            color: #2A241F;
        }

        footer {
            background-color: #DDD2C3;
            border-top: 1px solid rgba(70, 55, 38, 0.08);
            padding: 50px 5%;
            text-align: center;
            color: #6D6257;
            font-size: 0.85rem;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .nav-logo .serif {
                font-size: 2rem;
            }

            .nav-links {
                margin-right: 5%;
            }

            .nav-links a {
                margin-left: 18px;
                font-size: 0.88rem;
            }

            .post-wrap {
                padding-top: 130px;
                padding-bottom: 70px;
            }

            .post-title {
                font-size: 2.2rem;
            }

            .post-content {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="{{ '/' | relative_url }}" class="nav-logo">
            <span class="serif">서낭</span>
            <span class="logo-eng">SEONANG</span>
        </a>
        <div class="nav-links">
            <a href="{{ '/#about' | relative_url }}">About</a>
            <a href="{{ '/#services' | relative_url }}">Services</a>
            <a href="{{ '/blog' | relative_url }}">Blog</a>
        </div>
    </nav>

    <main class="post-wrap">
        <header class="post-header">
            <div class="post-date">{{ page.date | date: "%Y. %m. %d." }}</div>
            <h1 class="post-title serif">{{ page.title }}</h1>
            {% if page.description %}
            <p class="post-subtitle">{{ page.description }}</p>
            {% endif %}
        </header>

        <article class="post-content">
            {{ content }}
        </article>

        <div class="post-bottom-nav">
            <a class="back-to-blog" href="{{ '/blog' | relative_url }}">← Blog로 돌아가기</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Seonang. All rights reserved.</p>
    </footer>

</body>
</html>
