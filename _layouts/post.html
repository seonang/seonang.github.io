---
layout: null
---
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - 서낭</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg: #EAE2D6;
            --bg-strong: #DDD2C3;
            --text: #2F2923;
            --text-strong: #2A241F;
            --text-muted: #6D6257;
            --accent: #9C7A42;
            --border: rgba(70, 55, 38, 0.10);
            --border-soft: rgba(70, 55, 38, 0.08);
            --header-height: 96px;
            --header-padding-y: 15px;
            --page-gutter: 5%;
            --content-width: 1050px;
            --post-width: 860px;
            --footer-padding-y: 50px;
        }

        html {
            scroll-behavior: smooth;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 0% 20%, rgba(156, 122, 66, 0.08) 0%, transparent 38%),
                radial-gradient(circle at 100% 85%, rgba(120, 102, 76, 0.06) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, .serif {
            font-family: 'Noto Serif KR', serif;
            font-weight: 600;
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: var(--header-padding-y) 0;
            background: rgba(234, 226, 214, 0.82);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            box-sizing: border-box;
        }

        .site-header-inner {
            max-width: calc(var(--content-width) + (var(--page-gutter) * 2));
            margin: 0 auto;
            padding: 0 var(--page-gutter);
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-logo .serif {
            font-size: 2.4rem;
            color: var(--text-strong);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .nav-logo .logo-eng {
            font-size: 1rem;
            color: var(--accent);
            font-family: 'Pretendard', sans-serif;
            letter-spacing: 3px;
            margin-top: 4px;
            font-weight: 300;
            line-height: 1.1;
        }

        .nav-links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-strong);
        }

        .site-main {
            flex: 1;
            display: block;
        }

        .post-page {
            padding: calc(var(--header-height) + 54px) var(--page-gutter) 90px;
            box-sizing: border-box;
        }

        .post-wrap {
            max-width: var(--post-width);
            margin: 0 auto;
            width: 100%;
        }

        .post-header {
            margin-bottom: 48px;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }

        .post-date {
            color: #7A6D61;
            font-size: 0.95rem;
            font-weight: 300;
            margin-bottom: 12px;
        }

        .post-title {
            font-size: 3rem;
            line-height: 1.3;
            margin: 0 0 14px 0;
            color: var(--text-strong);
            word-break: keep-all;
        }

        .post-subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
            margin: 0;
        }

        .post-content {
            font-size: 1.05rem;
            color: #3A332D;
        }

        .post-content p {
            margin: 0 0 1.4em 0;
        }

        .post-content h2,
        .post-content h3,
        .post-content h4 {
            color: var(--text-strong);
            margin-top: 2.4em;
            margin-bottom: 0.8em;
            line-height: 1.4;
        }

        .post-content ul,
        .post-content ol {
            margin: 0 0 1.4em 1.4em;
            padding: 0;
        }

        .post-content li {
            margin-bottom: 0.5em;
        }

        .post-content blockquote {
            margin: 2em 0;
            padding: 1px 0 1px 20px;
            border-left: 2px solid rgba(156, 122, 66, 0.5);
            color: #5E544A;
        }

        .post-content a {
            color: #8A6737;
            text-decoration: none;
            border-bottom: 1px solid rgba(138, 103, 55, 0.25);
        }

        .post-content a:hover {
            color: #6F512A;
            border-bottom-color: rgba(111, 81, 42, 0.45);
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 2em auto;
        }

        .post-content hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 2.5em 0;
        }

        .post-bottom-nav {
            margin-top: 64px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
        }

        .back-to-blog {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-to-blog:hover {
            color: var(--text-strong);
        }

        .site-footer {
            margin-top: auto;
            background-color: var(--bg-strong);
            border-top: 1px solid var(--border-soft);
            padding: var(--footer-padding-y) var(--page-gutter);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300;
            box-sizing: border-box;
        }

        .site-footer p {
            margin: 0;
        }

        @media (max-width: 768px) {
            :root {
                --header-height: 88px;
            }

            .nav-logo .serif {
                font-size: 2rem;
            }

            .nav-links a {
                margin-left: 18px;
                font-size: 0.88rem;
            }

            .post-page {
                padding-top: calc(var(--header-height) + 40px);
                padding-bottom: 70px;
            }

            .post-title {
                font-size: 2.2rem;
            }

            .post-content {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a href="{{ '/' | relative_url }}" class="nav-logo">
                <span class="serif">서낭</span>
                <span class="logo-eng">SEONANG</span>
            </a>
            <nav class="nav-links">
                <a href="{{ '/#about' | relative_url }}">About</a>
                <a href="{{ '/#services' | relative_url }}">Services</a>
                <a href="{{ '/blog' | relative_url }}" class="active">Blog</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <section class="post-page">
            <div class="post-wrap">
                <header class="post-header">
                    <div class="post-date">{{ page.date | date: "%Y. %m. %d." }}</div>
                    <h1 class="post-title serif">{{ page.title }}</h1>
                    {% if page.description %}
                    <p class="post-subtitle">{{ page.description }}</p>
                    {% endif %}
                </header>

                <article class="post-content">
                    {{ content }}
                </article>

                <div class="post-bottom-nav">
                    <a class="back-to-blog" href="{{ '/blog' | relative_url }}">← Blog로 돌아가기</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Seonang. All rights reserved.</p>
    </footer>
</body>
</html>
