---
layout: default
title: 문의
section: contact
permalink: /contact/
description: 커피챗 신청 및 문의
---
<section class="contact-page">
  <div class="contact-shell">
    <div class="contact-intro">
      <p class="page-kicker">Contact</p>
      <h1>커피챗 신청 / 문의</h1>
      <p>
        편하게 남겨주세요. 커피챗 신청도, 일반 문의도 여기서 받습니다.
      </p>
      <p class="contact-email-line">
        이메일 <a href="mailto:{{ site.contact_email }}">{{ site.contact_email }}</a>
      </p>
    </div>

    <div class="contact-form-wrap">
      <form id="contact-form" class="contact-form minimal-form">
        <div class="form-row">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-row">
          <label for="contact">연락처</label>
          <input type="text" id="contact" name="contact" placeholder="이메일 또는 전화번호" required>
        </div>

        <div class="form-row">
          <label for="message">내용</label>
          <textarea id="message" name="message" rows="10" placeholder="커피챗 신청 또는 문의 내용을 적어주세요." required></textarea>
        </div>

        <button type="submit" class="dark-button">문의 남기기</button>
        <p id="form-status" class="form-status"></p>
      </form>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('contact-form');
  if (!form) return;

  const statusEl = document.getElementById('form-status');
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const payload = {
      name: form.name.value.trim(),
      contact: form.contact.value.trim(),
      message: form.message.value.trim()
    };

    if (!payload.name || !payload.contact || !payload.message) {
      statusEl.textContent = '모든 항목을 입력해 주세요.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '전송 중...';
    statusEl.textContent = '';

    try {
      const response = await fetch('https://seonang-contact-worker.ceo-21b.workers.dev', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (!response.ok) {
        throw new Error(result.error || '전송 중 오류가 발생했습니다.');
      }

      form.reset();
      statusEl.textContent = '문의가 정상적으로 접수되었습니다.';
    } catch (error) {
      statusEl.textContent = error.message || '전송 중 오류가 발생했습니다.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '문의 남기기';
    }
  });
});
</script>
